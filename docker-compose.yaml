services:
  my-chat:
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    build: .
    volumes:
      - .:/src
    ports:
      - 8000:8000
  db:
    image: mysql:8.0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: 'demo'
      TZ: 'Asia/Tokyo'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - 33306:3306
    healthcheck:
      test: ["CMD", "mysql", "-u", "root", "-e", "SELECT 1"]
      interval: 5s
      retries: 10
volumes:
  mysql_data: